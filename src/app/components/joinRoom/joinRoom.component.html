<div
  class="h-screen w-screen bg-gradient-to-br from-green-800 via-green-900 to-green-800 flex items-center justify-center p-4"
>
  <div class="max-w-md w-full">
    <button
      class="mb-6 flex items-center gap-2 text-neutral-200 hover:text-white transition-colors"
    >
      <svg
        class="w-5 h-5"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
      Back
    </button>

    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white mb-2">Join Room</h2>
      <p class="text-neutral-200">Enter an existing meeting</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-white font-medium mb-2">Your Name</label>
        <input
          [(ngModel)]="userName"
          type="text"
          placeholder="Enter your name"
          class="w-full bg-green-700 text-white placeholder:text-neutral-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-950 border border-green-900"
        />
      </div>

      <div>
        <label class="block text-white font-medium mb-2">Room Code</label>
        <input
          [(ngModel)]="roomCode"
          type="text"
          placeholder="Enter room code"
          maxlength="6"
          class="w-full bg-green-700 text-white placeholder:text-neutral-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-950 border border-green-900"
        />
      </div>

      <button
        class="w-full bg-neutral-800 hover:bg-neutral-900 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-200 transform hover:scale-105 mt-6 shadow-lg"
      >
        Join Room
      </button>
    </div>

    <div class="mt-8 p-4 bg-green-600 rounded-lg">
      <p class="text-neutral-200 text-sm text-center">
        <span class="font-semibold text-white text-center">Don't have a code?</span> Ask
        someone in the meeting to share it with you
      </p>
    </div>
  </div>
</div>
