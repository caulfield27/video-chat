<div class="app-shell flex items-center justify-center">
  <section class="glass-card w-full max-w-xl p-6 md:p-8">
    <button
      (click)="onBack()"
      class="inline-flex items-center gap-2 text-sm text-[var(--text-primary)] transition"
    >
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      {{ i18n.t('common.back') }}
    </button>

    <h2 class="mt-5 text-3xl font-bold">{{ i18n.t('join.title') }}</h2>
    <p class="mt-2 text-[var(--text-primary)]">{{ i18n.t('join.subtitle') }}</p>

    <div class="mt-8 space-y-5">
      <div>
        <label class="field-label">{{ i18n.t('join.displayName') }}</label>
        <input
          [(ngModel)]="userName"
          type="text"
          [placeholder]="i18n.t('join.displayNamePlaceholder')"
          class="app-input"
        />
      </div>

      <div>
        <label class="field-label">{{ i18n.t('join.roomCode') }}</label>
        <input
          [(ngModel)]="roomCode"
          type="text"
          [placeholder]="i18n.t('join.roomCodePlaceholder')"
          class="app-input"
        />
      </div>

      <button
        (click)="onJoin()"
        [disabled]="isJoining || !roomCode.trim()"
        class="app-btn-primary mt-2 w-full"
      >
        @if (isJoining) {
          {{ i18n.t('join.joining') }}
        } @else {
          {{ i18n.t('join.submit') }}
        }
      </button>

      <p class="text-xs text-[var(--text-muted)]">
        {{ i18n.t('join.tip') }}
      </p>
    </div>
  </section>
</div>
