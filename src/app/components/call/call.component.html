<div
  class="h-screen w-screen flex flex-col overflow-hidden"
>
  <header
    class="bg-green-900 px-6 py-4 flex items-center justify-between border-b border-green-800"
  >
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-white rounded-lg flex items-center justify-center"
      >
        <svg
          class="w-6 h-6 text-green-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
          />
        </svg>
      </div>
      <div>
        <h1 class="text-white text-lg font-semibold">Video Chat</h1>
        <p class="text-neutral-300 text-sm">Meeting Room</p>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 px-3 py-2 bg-green-700 rounded-lg">
        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
        <span class="text-neutral-200 text-sm">{{ callDuration() }}</span>
      </div>
      <button class="text-neutral-300 hover:text-white transition-colors">
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
      </button>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <div class="flex-1 relative">
      <div class="absolute inset-0 bg-gradient-to-br from-green-800 via-green-900 to-green-800">
        <div class="w-full h-full flex items-center justify-center">
          <div class="text-center">
            <div
              class="w-32 h-32 bg-neutral-800 rounded-full flex items-center justify-center mx-auto mb-4"
            >
              <span class="text-4xl text-white font-semibold">JD</span>
            </div>
            <p class="text-white text-xl font-medium">John Doe</p>
            <p class="text-neutral-300 text-sm mt-1">Microphone is muted</p>
          </div>
        </div>
      </div>

      <div class="absolute top-4 left-4 flex gap-2">
        <div
          class="bg-neutral-800/90 backdrop-blur-sm px-3 py-2 rounded-lg flex items-center gap-2"
        >
          <svg
            class="w-4 h-4 text-neutral-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <span class="text-white text-sm">2 participants</span>
        </div>
      </div>

      <div
        class="absolute top-4 right-4 w-64 h-48 bg-neutral-800 rounded-xl overflow-hidden shadow-2xl border-2 border-neutral-700"
      >
        <div
          class="w-full h-full bg-gradient-to-br from-neutral-700 to-neutral-800 flex items-center justify-center"
        >
          <div class="text-center">
            <div
              class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center mx-auto mb-2"
            >
              <span class="text-xl text-white font-semibold">ME</span>
            </div>
            <p class="text-white text-sm font-medium">You</p>
          </div>
        </div>
        <div
          class="absolute bottom-2 right-2 bg-neutral-900/80 backdrop-blur-sm px-2 py-1 rounded text-xs text-white"
        >
          Local
        </div>
      </div>

      <div
        class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-4 bg-neutral-800/95 backdrop-blur-lg px-6 py-4 rounded-2xl shadow-2xl border border-neutral-700"
      >
        <button
          (click)="isMuted.set(!isMuted())"
          [class]="
            isMuted()
              ? 'bg-red-600 hover:bg-red-700'
              : 'bg-neutral-700 hover:bg-neutral-600'
          "
          class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
        >
          <svg
            *ngIf="!isMuted()"
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
            />
          </svg>
          <svg
            *ngIf="isMuted()"
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
              clip-rule="evenodd"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"
            />
          </svg>
        </button>

        <button
          (click)="isVideoOff.set(!isVideoOff())"
          [class]="
            isVideoOff()
              ? 'bg-red-600 hover:bg-red-700'
              : 'bg-neutral-700 hover:bg-neutral-600'
          "
          class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
        >
          <svg
            *ngIf="!isVideoOff()"
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
            />
          </svg>
          <svg
            *ngIf="isVideoOff()"
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 3l18 18"
            />
          </svg>
        </button>

        <button
          (click)="isScreenSharing.set(!isScreenSharing())"
          [class]="
            isScreenSharing()
              ? 'bg-green-600 hover:bg-green-700'
              : 'bg-neutral-700 hover:bg-neutral-600'
          "
          class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
        >
          <svg
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
        </button>

        <button
          (click)="isChatOpen.set(!isChatOpen())"
          class="w-14 h-14 bg-neutral-700 hover:bg-neutral-600 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105 relative"
        >
          <svg
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
            />
          </svg>
          <div
            class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-xs text-white font-semibold"
          >
            3
          </div>
        </button>

        <div class="w-px h-10 bg-neutral-700 mx-2"></div>

        <button
          (click)="onCallEnd()"
          class="w-14 h-14 bg-red-600 hover:bg-red-700 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105 shadow-lg"
        >
          <svg
            class="w-6 h-6 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"
            />
          </svg>
        </button>
      </div>
    </div>

    <div
      *ngIf="isChatOpen()"
      class="w-96 bg-neutral-800 border-l border-neutral-700 flex flex-col"
    >
      <div
        class="px-6 py-4 border-b border-neutral-700 flex items-center justify-between"
      >
        <h2 class="text-white font-semibold text-lg">Chat</h2>
        <button
          (click)="isChatOpen.set(false)"
          class="text-neutral-400 hover:text-white transition-colors"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4">
        <div class="flex gap-3">
          <div
            class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <span class="text-sm text-white font-semibold">JD</span>
          </div>
          <div class="flex-1">
            <div class="flex items-baseline gap-2 mb-1">
              <span class="text-white font-medium text-sm">John Doe</span>
              <span class="text-neutral-500 text-xs">10:30 AM</span>
            </div>
            <div class="bg-neutral-700 rounded-lg rounded-tl-none px-4 py-2">
              <p class="text-neutral-100 text-sm">Hey! Can you hear me okay?</p>
            </div>
          </div>
        </div>

        <div class="flex gap-3 flex-row-reverse">
          <div
            class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <span class="text-sm text-white font-semibold">ME</span>
          </div>
          <div class="flex-1">
            <div class="flex items-baseline gap-2 mb-1 flex-row-reverse">
              <span class="text-white font-medium text-sm">You</span>
              <span class="text-neutral-500 text-xs">10:31 AM</span>
            </div>
            <div class="bg-green-600 rounded-lg rounded-tr-none px-4 py-2">
              <p class="text-white text-sm">Yes, loud and clear!</p>
            </div>
          </div>
        </div>

        <div class="flex gap-3">
          <div
            class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center flex-shrink-0"
          >
            <span class="text-sm text-white font-semibold">JD</span>
          </div>
          <div class="flex-1">
            <div class="flex items-baseline gap-2 mb-1">
              <span class="text-white font-medium text-sm">John Doe</span>
              <span class="text-neutral-500 text-xs">10:32 AM</span>
            </div>
            <div class="bg-neutral-700 rounded-lg rounded-tl-none px-4 py-2">
              <p class="text-neutral-100 text-sm">
                Perfect! Let's start the meeting.
              </p>
            </div>
          </div>
        </div>
      </div>

      <div class="px-6 py-4 border-t border-neutral-700">
        <div class="flex gap-2">
          <input
            type="text"
            placeholder="Type a message..."
            class="flex-1 bg-neutral-700 text-white placeholder-neutral-400 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-500"
          />
          <button
            class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg transition-colors flex items-center justify-center"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
