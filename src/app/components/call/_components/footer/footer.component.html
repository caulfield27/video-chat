<footer
  class="sticky bottom-2 z-20 mx-auto w-full max-w-3xl pb-1 md:bottom-3 md:pb-0"
  [ngClass]="app.isChatOpen() ? 'max-lg:hidden' : ''"
>
  <div
    class="glass-card flex items-center justify-center gap-2 overflow-x-auto px-2 py-2 md:gap-3 md:px-4 md:py-3"
  >
    <button
      (click)="toggleMute()"
      [class]="
        app.isMuted()
          ? 'bg-red-600 hover:bg-red-700'
          : 'bg-[var(--bg-surface)] hover:bg-[var(--hover-surface)]'
      "
      class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
    >
      <svg
        *ngIf="!app.isMuted()"
        class="w-6 h-6 text-[var(--text-primary)]"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"
        />
      </svg>
      <svg
        *ngIf="app.isMuted()"
        [class]="app.isMuted() ? 'text-white' : 'text-[var(--text-primary)]'"
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
          clip-rule="evenodd"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"
        />
      </svg>
    </button>

    <button
      (click)="toggleVideo()"
      [class]="
        app.isVideoOff()
          ? 'bg-red-600 hover:bg-red-700'
          : 'bg-[var(--bg-surface)] hover:bg-[var(--hover-surface)]'
      "
      class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
    >
      <svg
        *ngIf="!app.isVideoOff()"
        class="w-6 h-6 text-[var(--text-primary)]"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
        />
      </svg>
      <svg
        *ngIf="app.isVideoOff()"
        class="w-6 h-6 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 3l18 18"
        />
      </svg>
    </button>

    <button
      (click)="toggleScreenSharing()"
      [class]="
        app.isScreenSharing()
          ? 'bg-green-600 hover:bg-green-700'
          : 'bg-[var(--bg-surface)] hover:bg-[var(--hover-surface)]'
      "
      class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105"
    >
      <svg
        [class]="
          app.isScreenSharing() ? 'text-white' : 'text-[var(--text-primary)]'
        "
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
        />
      </svg>
    </button>

    <button
      (click)="app.toggleChat()"
      class="w-14 h-14 bg-[var(--bg-surface)] hover:bg-[var(--hover-surface)] rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105 relative"
    >
      <svg
        class="w-6 h-6 text-[var(--text-primary)]"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
        />
      </svg>
      @if (app.nots()) {
        <div
          class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center text-xs text-white font-semibold"
        >
          {{ app.nots() }}
        </div>
      }
    </button>
    <button
      (click)="onCallEnd()"
      class="w-14 h-14 bg-red-600 hover:bg-red-700 rounded-full flex items-center justify-center transition-all duration-200 transform hover:scale-105 shadow-lg"
    >
      <svg
        class="w-6 h-6 text-white"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"
        />
      </svg>
    </button>
  </div>
</footer>
